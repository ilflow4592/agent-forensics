site_name: Agent Forensics
site_url: https://ilflow4592.github.io/agent-forensics
site_description: Black box for AI agents — capture decisions, generate forensic reports for EU AI Act compliance
repo_url: https://github.com/ilflow4592/agent-forensics
repo_name: ilflow4592/agent-forensics

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference: api-reference.md
  - Integrations:
    - Overview: integrations.md
    - LangChain: integrations/langchain.md
    - OpenAI Agents SDK: integrations/openai-agents.md
    - CrewAI: integrations/crewai.md
  - Failure Patterns: failure-patterns.md
  - EU AI Act Compliance: eu-ai-act.md
  - Changelog: changelog.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
